{% extends 'layout.html' %}
{% block content %}
<div class="card shadow-sm border-0">
    <table class="table align-middle mb-0 table-hover">
        <thead class="table-dark">
            <tr>
                <th>Tgl Masuk</th>
                <th>Judul & Penulis</th>
                <th>Kategori</th>
                <th>Stok</th>
                <th class="text-center">Aksi</th> </tr>
        </thead>
        <tbody>
            {% for b in books %}
            <tr>
                <td><small class="text-muted">{{ b.tanggal_masuk if b.tanggal_masuk else '-' }}</small></td>
                <td>
                    <a href="/buku/{{ b.id }}" class="text-decoration-none text-dark fw-bold">{{ b.judul }}</a>
                    <div class="small text-muted">{{ b.penulis }}</div>
                </td>
                <td><span class="badge bg-info text-dark">{{ b.kategori }}</span></td>
                <td>{{ b.stok }}</td>
                <td class="text-center">
                    <div class="btn-group">
                        <a href="/edit/{{ b.id }}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <a href="/delete/{{ b.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Hapus buku ini?')">
                            <i class="bi bi-trash"></i> Hapus
                        </a>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
