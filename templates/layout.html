<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem E-Perpus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">📚 E-Perpus</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="bi bi-search"></i> Cari Buku</a>
                <a class="nav-link" href="/koleksi"><i class="bi bi-database"></i> Database</a>
                <a class="nav-link" href="/peminjaman"><i class="bi bi-person-lines-fill"></i> Peminjaman</a>
                <button class="btn btn-primary btn-sm ms-lg-3 mt-2 mt-lg-0" data-bs-toggle="modal" data-bs-target="#modalTambah">
                    <i class="bi bi-plus-circle"></i> Tambah Buku
                </button>
            </div>
        </div>
    </div>
</nav>

<div class="modal fade" id="modalTambah" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="/add" method="POST">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Koleksi Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="small fw-bold">Judul Buku</label>
                        <input type="text" name="judul" class="form-control" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="small fw-bold">Penulis</label>
                            <input type="text" name="penulis" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold">Kategori</label>
                            <input type="text" name="kategori" class="form-control" placeholder="Contoh: IT">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-4">
                            <label class="small fw-bold">Rak</label>
                            <input type="text" name="kode_rak" class="form-control" placeholder="Contoh: A">
                        </div>
                        <div class="col-4">
                            <label class="small fw-bold">Baris</label>
                            <input type="text" name="baris_rak" class="form-control" placeholder="Contoh: 1">
                        </div>
                        <div class="col-4">
                            <label class="small fw-bold">Stok</label>
                            <input type="number" name="stok" class="form-control" value="1">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Simpan Buku</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="container">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
