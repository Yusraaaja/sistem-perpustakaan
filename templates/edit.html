<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Buku</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="fw-bold mb-4 text-primary">Perbarui Data Buku</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Judul Buku</label>
                        <input type="text" name="judul" class="form-control" value="{{ buku.judul }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Penulis</label>
                        <input type="text" name="penulis" class="form-control" value="{{ buku.penulis }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Kategori</label>
                        <input type="text" name="kategori" class="form-control" value="{{ buku.kategori }}">
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Rak</label>
                            <input type="text" name="kode_rak" class="form-control" value="{{ buku.kode_rak }}">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Baris</label>
                            <input type="number" name="baris_rak" class="form-control" value="{{ buku.baris_rak }}">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Stok</label>
                        <input type="number" name="stok" class="form-control" value="{{ buku.stok }}">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary fw-bold">Simpan Perubahan</button>
                        <a href="/" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
