{% extends 'layout.html' %}
{% block content %}
<div class="card shadow-sm p-4">
    <h4 class="fw-bold mb-3">Pencarian Cepat</h4>
    <form action="/search" method="GET" class="d-flex mb-4">
        <input type="text" name="query" class="form-control me-2" placeholder="Ketik judul buku..." value="{{ query or '' }}">
        <button type="submit" class="btn btn-primary px-4">Cari</button>
    </form>

    {% if results %}
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Judul Buku (Klik untuk Detail)</th>
                    <th>Penulis</th>
                    <th>Stok</th>
                </tr>
            </thead>
            <tbody>
                {% for b in results %}
                <tr>
                    <td>
                        <a href="/buku/{{ b.id }}" class="text-decoration-none fw-bold text-primary">
                            {{ b.judul }}
                        </a>
                    </td>
                    <td>{{ b.penulis }}</td>
                    <td><span class="badge bg-success">{{ b.stok }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endif %}
</div>
{% endblock %}
