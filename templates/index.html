<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Perpustakaan Digital</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        /* Form Styling */
        .form-group { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; flex: 1; min-width: 150px; }
        .btn-add { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background-color: #2980b9; }

        /* Table Styling */
        table { border-collapse: collapse; width: 100%; margin-top: 30px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .tag-rak { background: #e67e22; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tambah Buku Baru</h2>
        <form action="/add" method="POST" class="form-group">
            <input type="text" name="judul" placeholder="Judul Buku" required>
            <input type="text" name="penulis" placeholder="Penulis">
            <input type="text" name="kategori" placeholder="Kategori (Misal: Sejarah)">
            <input type="text" name="kode_rak" placeholder="Rak (A/B/C)" style="max-width: 80px;">
            <input type="number" name="baris_rak" placeholder="Baris" style="max-width: 80px;">
            <input type="number" name="stok" placeholder="Stok" style="max-width: 80px;">
            <button type="submit" class="btn-add">Simpan Buku</button>
        </form>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

        <h2>Pencarian & Koleksi</h2>
        <form action="/search" method="GET" class="form-group">
            <input type="text" name="query" placeholder="Cari judul buku..." required>
            <button type="submit" style="background-color: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;">Cari</button>
            <a href="/" style="text-decoration: none; padding: 10px; color: #7f8c8d;">Reset</a>
        </form>

        {% if results %}
            <table>
                <tr>
                    <th>Judul</th>
                    <th>Penulis</th>
                    <th>Kategori</th>
                    <th>Lokasi Rak</th>
                    <th>Stok</th>
                </tr>
                {% for buku in results %}
                <tr>
                    <td><strong>{{ buku.judul }}</strong></td>
                    <td>{{ buku.penulis }}</td>
                    <td>{{ buku.kategori }}</td>
                    <td><span class="tag-rak">Rak {{ buku.kode_rak }} - Baris {{ buku.baris_rak }}</span></td>
                    <td>{{ buku.stok }}</td>
                </tr>
                {% endfor %}
            </table>
        {% endif %}
    </div>
</body>
</html>
